<style>
  :root {
    --bg: #fafafa; --card: #ffffff; --border: #dbdbdb;
    --text: #262626; --muted: #8e8e8e; --link: #00376b; --accent: #b05c2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { max-width: 470px; margin: 0 auto; padding: 24px 0 80px; }
  h1 { font-size: 22px; text-align: center; padding: 8px 16px 2px; letter-spacing: 2px; }
  .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; padding: 0 16px; }
  .phase { margin: 34px 12px 10px; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 6px; }
  .post { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin: 0 12px 28px; overflow: hidden; }
  .head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#2c2a4a,#b05c2a); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
  .handle { font-weight: 600; font-size: 14px; }
  .loc { font-size: 12px; color: var(--muted); }
  .tag { margin-left: auto; font-size: 11px; font-weight: 700; color: #fff; background: var(--accent); border-radius: 12px; padding: 3px 10px; white-space: nowrap; }
  .tag.reel { background: #2c2a4a; }
  .media { width: 100%; display: block; background: #000; }
  video.media { max-height: 560px; }
  img.media { max-height: 560px; object-fit: cover; }
  .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background:#000; }
  .carousel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; max-height: 560px; object-fit: cover; }
  .carousel-hint { text-align:center; font-size:11px; color:var(--muted); padding:4px 0; }
  .caption { padding: 12px 14px 14px; font-size: 14px; line-height: 1.45; white-space: pre-line; }
  .caption b { font-weight: 600; }
  .hashtags { color: var(--link); }
  .note { background: #fff8f2; border-top: 1px solid #f0e0d0; padding: 8px 14px; font-size: 12px; color: #7a5c3f; }
  .missing { padding: 30px; text-align: center; color: var(--muted); font-size: 13px; background: #f4f4f4; }
</style>
</head>

const feed = document.getElementById("feed");
for (const p of posts) {
  if (p.phase) {
    const h = document.createElement("div");
    h.className = "phase"; h.textContent = p.phase;
    feed.appendChild(h);
    continue;
  }
  const card = document.createElement("div");
  card.className = "post";
  let media;
  if (p.type === "reel") {
    media = `<video class="media" src="${p.src}" controls preload="metadata"></video>`;
  } else if (p.type === "carousel") {
    media = `<div class="carousel">` + p.srcs.map(s => `<img src="${s}" loading="lazy" onerror="this.outerHTML='<div class=missing>Image not found:<br>${s}</div>'">`).join("") + `</div><div class="carousel-hint">‹ swipe ›</div>`;
  } else {
    media = `<img class="media" src="${p.src}" loading="lazy" onerror="this.outerHTML='<div class=missing>Image not found:<br>${p.src}</div>'">`;
  }
  const caption = p.cap
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/(#[A-Za-z0-9]+)/g, '<span class="hashtags">$1</span>');
  card.innerHTML = `
    <div class="head">
      <div class="avatar">T</div>
      <div><div class="handle">tizirirugs</div><div class="loc">${p.loc}</div></div>
      <div class="tag ${p.type === "reel" ? "reel" : ""}">${p.label}</div>
    </div>
    ${media}
    <div class="caption">${caption}</div>
    ${p.note ? `<div class="note">📝 ${p.note}</div>` : ""}`;
  feed.appendChild(card);
}
