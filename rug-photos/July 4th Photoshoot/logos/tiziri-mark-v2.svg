<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- V2: Double crossing — 2+2 parallel diagonal pairs forming a woven grid -->
  <defs>
    <clipPath id="circle-v2">
      <circle cx="110" cy="110" r="100"/>
    </clipPath>
  </defs>
  <circle cx="110" cy="110" r="100" fill="#F0E2C4"/>
  <g clip-path="url(#circle-v2)">
    <!-- NW-SE pair (slope +1) -->
    <line x1="5"   y1="50"  x2="165" y2="210" stroke="#1A1410" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55"  y1="5"   x2="215" y2="165" stroke="#1A1410" stroke-width="2.5" stroke-linecap="square"/>
    <!-- NE-SW pair (slope -1) -->
    <line x1="5"   y1="165" x2="165" y2="5"   stroke="#B84020" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55"  y1="215" x2="215" y2="55"  stroke="#B84020" stroke-width="2.5" stroke-linecap="square"/>
  </g>
  <circle cx="110" cy="110" r="100" fill="none" stroke="#1A1410" stroke-width="2"/>
</svg>
