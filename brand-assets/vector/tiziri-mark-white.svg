<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Single-color mark, no background. For placement on dark/ink grounds. -->
  <defs>
    <clipPath id="tiziri-mark-white-clip"><circle cx="100" cy="100" r="94"/></clipPath>
  </defs>
  <g clip-path="url(#tiziri-mark-white-clip)">
    <rect width="200" height="75.4" fill="#FFFFFF"/>
    <rect y="75.6" width="200" height="1.6" fill="#FFFFFF"/>
  </g>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#FFFFFF" stroke-width="1.1"/>
</svg>
