name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      # Boundaries (dependency direction) — a violation FAILS the build (Master Plan §2).
      - run: npm run boundaries
      # Types across the whole monorepo.
      - run: npm run typecheck
      # Golden tests: colour round-trip, Reel disk+SQLite round-trip, migrations, library index.
      - run: npm test
      # Performance micro-budgets (harness stub; grows into the real budget suite).
      - run: npm run bench

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run typecheck -w @tiziri/shell-electron
      - run: npm run build -w @tiziri/shell-electron
      # Electron needs a display on Linux; xvfb provides a virtual one.
      - run: xvfb-run --auto-servernum node ./scripts/self-test-run.mjs
        working-directory: packages/shell-electron

  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
        working-directory: packages/analysis
      - name: unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -p "test_*.py"
        working-directory: packages/analysis
      # Electron<->sidecar integration (run/progress/cancel/timeout/errors).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: node ./scripts/analysis-integration.mjs
        working-directory: packages/shell-electron
