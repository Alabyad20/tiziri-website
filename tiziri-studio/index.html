<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#a15a38" />
    <title>Tiziri Studio</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- PWA-ready: manifest ships now; a service worker + install flow is a later step -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      try {
        const s = JSON.parse(localStorage.getItem("tiziri-studio:settings") || "{}");
        const theme = s?.state?.theme ?? "light";
        const dark =
          theme === "dark" ||
          (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
