<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting to secure checkout — TIZIRI</title>
    <style>
        :root { color-scheme: light dark; }
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; align-items: center; justify-content: center;
            font-family: Georgia, 'Times New Roman', serif;
            background: #faf8f4; color: #201d19; text-align: center; padding: 24px;
        }
        @media (prefers-color-scheme: dark) { body { background: #17150f; color: #efe9df; } }
        .box { max-width: 420px; }
        .spinner {
            width: 34px; height: 34px; margin: 0 auto 22px;
            border: 3px solid rgba(160,120,70,.25); border-top-color: #a1784a;
            border-radius: 50%; animation: spin .9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 1.25rem; font-weight: normal; margin: 0 0 10px; }
        p { margin: 8px 0; color: #6b665e; font-size: .95rem; }
        a { color: #a1784a; }
    </style>
</head>
<body>
    <main class="box">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Taking you to secure checkout…</h1>
        <p>You're being redirected to complete your purchase safely via Stripe.</p>
        <p>Not redirected? <a id="fallback" href="/collections/">Continue to the shop</a></p>
    </main>
    <script>
    (async function () {
        var COLLECTIONS = "/collections/";
        function go(url) { window.location.replace(url); }

        var params = new URLSearchParams(window.location.search);
        var productsRaw = params.get("products") || "";
        // Meta sends "slug:qty,slug:qty". For one-of-a-kind rugs we route to the
        // first item's own Stripe payment link (each rug is a single, unique piece).
        var firstEntry = productsRaw.split(",")[0] || "";
        var slug = (firstEntry.split(":")[0] || "").trim().toLowerCase();

        if (!slug) { go(COLLECTIONS); return; }

        // point the visible fallback at the rug's own page immediately
        var fb = document.getElementById("fallback");
        if (fb) { fb.setAttribute("href", "/rugs/" + encodeURIComponent(slug) + ".html"); }

        try {
            var rugs = await fetch("/data/rugs.json", { cache: "no-store" }).then(function (r) { return r.json(); });
            var rug = rugs.find(function (r) { return (r.slug || "").toLowerCase() === slug; });
            if (rug && rug.stripeLink) { go(rug.stripeLink); return; }   // → secure Stripe checkout
            if (rug) { go("/rugs/" + rug.slug + ".html"); return; }      // no link (e.g. made-to-order) → product page
            go(COLLECTIONS);                                             // unknown id → shop
        } catch (e) {
            go("/rugs/" + encodeURIComponent(slug) + ".html");          // data fetch failed → best-effort product page
        }
    })();
    </script>
</body>
</html>
