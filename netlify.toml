[build]
  command = "python3 scripts/schema_tools.py build && python3 scripts/generate_merchant_feed.py && python3 scripts/geo_tools.py build"
  publish = "."

# Cache static assets aggressively; never cache HTML
[[headers]]
  for = "/rug-photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    # Lets Tiziri Studio composite catalog photos onto canvas without tainting it
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Accept-Ranges = "none"

[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Accept-Ranges = "none"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Accept-Ranges = "none"

# Internal working docs — never serve publicly
[[redirects]]
  from = "/marketing/*"
  to   = "/404.html"
  status = 404
  force  = true

# Internal desktop tool (Tiziri Studio) — never serve publicly
[[redirects]]
  from = "/tiziri-studio/*"
  to   = "/404.html"
  status = 404
  force  = true

# Redirect www to apex domain
[[redirects]]
  from = "https://www.tizirirugs.com/*"
  to   = "https://tizirirugs.com/:splat"
  status = 301
  force  = true
