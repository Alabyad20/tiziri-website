[build]
  command = "python3 scripts/schema_tools.py build && python3 scripts/generate_merchant_feed.py && python3 scripts/geo_tools.py build"
  publish = "."

# Security headers — applied site-wide. Allowlists cover exactly what's
# actually loaded: self-hosted assets, Google Fonts, Plausible analytics,
# and the MailerLite newsletter embed (universal.js + its form/jsonp CDNs).
# If a new third-party script/embed is ever added, its origin must be added
# here too or it will be silently blocked.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io https://assets.mailerlite.com https://groot.mailerlite.com https://assets.mlcdn.com https://static.mailerlite.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://plausible.io https://assets.mailerlite.com https://groot.mailerlite.com https://assets.mlcdn.com https://static.mailerlite.com; form-action 'self' https://assets.mailerlite.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache static assets aggressively; never cache HTML
[[headers]]
  for = "/rug-photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    # Lets Tiziri Studio composite catalog photos onto canvas without tainting it
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Accept-Ranges = "none"

[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Accept-Ranges = "none"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Accept-Ranges = "none"

# Internal working docs — never serve publicly
[[redirects]]
  from = "/marketing/*"
  to   = "/404.html"
  status = 404
  force  = true

# Internal desktop tool (Tiziri Studio) — never serve publicly
[[redirects]]
  from = "/tiziri-studio/*"
  to   = "/404.html"
  status = 404
  force  = true

# Redirect www to apex domain
[[redirects]]
  from = "https://www.tizirirugs.com/*"
  to   = "https://tizirirugs.com/:splat"
  status = 301
  force  = true
