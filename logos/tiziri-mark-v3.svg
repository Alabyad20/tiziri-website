<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- V3: Offset geometric — two NW-SE parallels crossed by one NE-SW line -->
  <defs>
    <clipPath id="circle-v3">
      <circle cx="110" cy="110" r="100"/>
    </clipPath>
  </defs>
  <circle cx="110" cy="110" r="100" fill="#F0E2C4"/>
  <g clip-path="url(#circle-v3)">
    <!-- Two parallel NW-SE diagonals (warp threads) -->
    <line x1="5"   y1="65"  x2="150" y2="210" stroke="#1A1410" stroke-width="3" stroke-linecap="square"/>
    <line x1="70"  y1="5"   x2="215" y2="150" stroke="#1A1410" stroke-width="3" stroke-linecap="square"/>
    <!-- One crossing NE-SW diagonal (weft thread) — terracotta -->
    <line x1="15"  y1="205" x2="205" y2="15"  stroke="#B84020" stroke-width="3" stroke-linecap="square"/>
  </g>
  <circle cx="110" cy="110" r="100" fill="none" stroke="#1A1410" stroke-width="2"/>
</svg>
