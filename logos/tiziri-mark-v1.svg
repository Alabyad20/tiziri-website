<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- V1: Single crossing — two 45° diagonals meeting at center -->
  <defs>
    <clipPath id="circle-v1">
      <circle cx="110" cy="110" r="100"/>
    </clipPath>
  </defs>
  <circle cx="110" cy="110" r="100" fill="#F0E2C4"/>
  <g clip-path="url(#circle-v1)">
    <line x1="5"   y1="5"   x2="215" y2="215" stroke="#1A1410" stroke-width="3" stroke-linecap="square"/>
    <line x1="215" y1="5"   x2="5"   y2="215" stroke="#1A1410" stroke-width="3" stroke-linecap="square"/>
  </g>
  <circle cx="110" cy="110" r="100" fill="none" stroke="#1A1410" stroke-width="2"/>
</svg>
