<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1060" width="700" height="1060">
  <title>TIZIRI Design 1 — Beni Ourain Ivory + Black Diamond Grid</title>

  <defs>
    <pattern id="d1-field" patternUnits="userSpaceOnUse" x="82" y="77" width="66" height="66">
      <rect width="66" height="66" fill="#F2EDE0"/>
      <polygon points="33,1 65,33 33,65 1,33" fill="none" stroke="#1C1C1C" stroke-width="2.5"/>
      <circle cx="33" cy="33" r="3.5" fill="#1C1C1C"/>
    </pattern>
    <clipPath id="d1-clip">
      <rect x="82" y="77" width="536" height="821"/>
    </clipPath>
  </defs>

  <!-- Canvas -->
  <rect width="700" height="1060" fill="#D5D0C4"/>

  <!-- ── INFO PANEL ── -->
  <rect x="0" y="960" width="700" height="100" fill="#1C1C1C"/>
  <text x="350" y="994" text-anchor="middle"
        font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#F2EDE0" letter-spacing="2">TIZIRI — DESIGN 1: BENI OURAIN CLASSIC</text>
  <text x="350" y="1016" text-anchor="middle"
        font-family="Georgia, serif" font-size="12" fill="#9A9186">
    Ivory Cream (#F2EDE0)  ×  Carbon Black (#1C1C1C)  |  High-pile handspun wool
  </text>
  <text x="350" y="1036" text-anchor="middle"
        font-family="Georgia, serif" font-size="12" fill="#9A9186">
    Full-field diamond lozenge grid  |  Minimalist Beni Ourain Berber
  </text>
  <!-- Colour swatches -->
  <rect x="268" y="1047" width="24" height="10" fill="#F2EDE0" stroke="#555" stroke-width="0.5"/>
  <text x="297" y="1056" font-family="Arial,sans-serif" font-size="9" fill="#777">Ivory</text>
  <rect x="358" y="1047" width="24" height="10" fill="#1C1C1C"/>
  <text x="387" y="1056" font-family="Arial,sans-serif" font-size="9" fill="#777">Black</text>

  <!-- ── RUG BODY ── -->
  <rect x="30" y="25" width="640" height="925" fill="#F2EDE0"/>

  <!-- Border system — 5 nested rectangles -->
  <rect x="30"  y="25"  width="640" height="925" fill="none" stroke="#1C1C1C" stroke-width="8"/>
  <rect x="46"  y="41"  width="608" height="893" fill="none" stroke="#1C1C1C" stroke-width="1.5"/>
  <rect x="54"  y="49"  width="592" height="877" fill="none" stroke="#1C1C1C" stroke-width="5"/>
  <rect x="67"  y="62"  width="566" height="851" fill="none" stroke="#1C1C1C" stroke-width="1.5"/>
  <rect x="76"  y="71"  width="548" height="833" fill="none" stroke="#1C1C1C" stroke-width="1"/>

  <!-- ── MAIN FIELD — diamond lozenge grid ── -->
  <rect x="82" y="77" width="536" height="821" fill="url(#d1-field)" clip-path="url(#d1-clip)"/>
</svg>
