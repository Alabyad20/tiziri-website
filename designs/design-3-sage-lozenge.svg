<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1060" width="700" height="1060">
  <title>TIZIRI Design 3 — Ivory + Sage Green Lozenge</title>

  <defs>
    <pattern id="d3-field" patternUnits="userSpaceOnUse" x="82" y="77" width="80" height="80">
      <!-- Ivory ground -->
      <rect width="80" height="80" fill="#F2EDE0"/>
      <!-- Sage outer diamond -->
      <polygon points="40,5 75,40 40,75 5,40" fill="#7A9B6E"/>
      <!-- Ivory inner diamond (cutout) -->
      <polygon points="40,18 62,40 40,62 18,40" fill="#F2EDE0"/>
      <!-- Sage centre dot -->
      <circle cx="40" cy="40" r="5" fill="#7A9B6E"/>
    </pattern>
    <clipPath id="d3-clip">
      <rect x="82" y="77" width="536" height="821"/>
    </clipPath>
  </defs>

  <!-- Canvas -->
  <rect width="700" height="1060" fill="#C8D1C0"/>

  <!-- ── INFO PANEL ── -->
  <rect x="0" y="960" width="700" height="100" fill="#1C1C1C"/>
  <text x="350" y="994" text-anchor="middle"
        font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#F2EDE0" letter-spacing="2">TIZIRI — DESIGN 3: IVORY + SAGE GREEN LOZENGE</text>
  <text x="350" y="1016" text-anchor="middle"
        font-family="Georgia, serif" font-size="12" fill="#9A9186">
    Ivory Cream (#F2EDE0)  ×  Sage Green (#7A9B6E)  |  High-pile handspun wool
  </text>
  <text x="350" y="1036" text-anchor="middle"
        font-family="Georgia, serif" font-size="12" fill="#9A9186">
    Full-field sage lozenge repeat  |  Trending minimalist-boho
  </text>
  <!-- Colour swatches -->
  <rect x="258" y="1047" width="24" height="10" fill="#F2EDE0" stroke="#555" stroke-width="0.5"/>
  <text x="287" y="1056" font-family="Arial,sans-serif" font-size="9" fill="#777">Ivory</text>
  <rect x="358" y="1047" width="24" height="10" fill="#7A9B6E"/>
  <text x="387" y="1056" font-family="Arial,sans-serif" font-size="9" fill="#777">Sage Green</text>

  <!-- ── RUG BODY ── -->
  <rect x="30" y="25" width="640" height="925" fill="#F2EDE0"/>

  <!-- Border system — sage accent lines -->
  <rect x="30" y="25"  width="640" height="925" fill="none" stroke="#1C1C1C" stroke-width="8"/>
  <rect x="46" y="41"  width="608" height="893" fill="none" stroke="#7A9B6E" stroke-width="2"/>
  <rect x="54" y="49"  width="592" height="877" fill="none" stroke="#1C1C1C" stroke-width="5"/>
  <rect x="67" y="62"  width="566" height="851" fill="none" stroke="#7A9B6E" stroke-width="1.5"/>
  <rect x="76" y="71"  width="548" height="833" fill="none" stroke="#1C1C1C" stroke-width="1"/>

  <!-- ── MAIN FIELD — sage lozenge repeat ── -->
  <rect x="82" y="77" width="536" height="821" fill="url(#d3-field)" clip-path="url(#d3-clip)"/>
</svg>
